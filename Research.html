        <div class="container description">
            <div class="row">
                <div class="col">
                    <h1 class="title text-center pt-3">Research</h1>
                    <p class="text text-start">You can search or see the house information by clicking this link: </p>

                    <a href="News.html" class="special-button">News</a>

                    <div class="special-images pt-5">
                        <div class="special-image">
                            <a href="Research.jpg" data-lightbox="enlarged" data-title="Left Image">

              </div>

        </footer>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Get all elements with the class 'enlargeable'
                var enlargeableImages = document.querySelectorAll('.enlargeable');
        
                // Add a click event listener to each image
                enlargeableImages.forEach(function(image) {
                    image.addEventListener('click', function() {
                        // Toggle the 'enlarged' class on click
                        this.classList.toggle('enlarged');
                    });
                });
            });
        </script> 
        <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
